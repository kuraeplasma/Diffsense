<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIFFsense Dashboard</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17941578077"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-17941578077');
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>body{margin:0;background:#fafafa;color:#222;font-family:Inter,"Noto Sans JP",sans-serif}#app-sidebar{width:250px;position:fixed;left:0;top:0;bottom:0;background:#111827;color:#fff;z-index:20}#app-main{margin-left:250px;min-height:100vh}#app-content{padding:24px;min-height:100vh}.shell-skeleton{display:grid;gap:14px}.skeleton-block{height:18px;background:linear-gradient(90deg,#eceff3,#f5f7fa,#eceff3);background-size:200% 100%;border-radius:6px;animation:skel 1.2s ease-in-out infinite}.skeleton-card{height:110px;border-radius:12px;background:#fff;border:1px solid #eceff3}.skeleton-row{height:46px;border-radius:8px;background:#fff;border:1px solid #eceff3}@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}@media (max-width:900px){#app-main{margin-left:0}#app-content{padding:16px}}</style>
    <link rel="preload" as="style" href="css/dashboard.css?v=4" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/dashboard.css?v=4"></noscript>
    <link rel="stylesheet" href="css/dashboard-structured-fix.css?v=20260309diff1">
    <!-- FontAwesome for Icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" type="image/png" href="favicon2.png?v=2">
</head>

<body>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <nav id="app-sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-scale-balanced"></i>
            DIFFsense
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="window.app.navigate('dashboard')">
                <div class="nav-icon"><i class="fa-solid fa-house"></i></div>
                <span>ダッシュボード</span>
            </div>
            <div class="nav-item" onclick="window.app.navigate('contracts')">
                <div class="nav-icon"><i class="fa-solid fa-file-contract"></i></div>
                <span>契約・規約管理</span>
            </div>
            <div class="nav-item" onclick="window.app.navigate('history')">
                <div class="nav-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <span>解析履歴</span>
            </div>
            <div class="nav-item" id="nav-team" onclick="window.app.navigate('team')" style="display:none;">
                <div class="nav-icon"><i class="fa-solid fa-users"></i></div>
                <span>チーム設定</span>
            </div>
            <div class="nav-item" id="nav-plan" onclick="window.app.navigate('plan')">
                <div class="nav-icon"><i class="fa-solid fa-credit-card"></i></div>
                <span>プラン管理</span>
            </div>
        </div>
        <div class="user-profile">
            <div id="plan-status-container"></div>
            <div style="font-weight:600; color:#fff;" id="user-name-display">ユーザー</div>
            <div id="user-email-display" style="font-size:11px; margin-bottom:10px;">...</div>
            <div style="cursor:pointer; color:#ccc;" id="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> ログアウト
            </div>
        </div>
    </nav>

    <button id="sidebar-toggle" class="btn-icon mobile-only sidebar-floating-toggle" aria-label="メニューを開く">
        <i class="fa-solid fa-bars"></i>
    </button>
    <button class="btn-dashboard btn-primary-action global-registration-btn" id="open-registration-btn"
        style="display:none;">
        <i class="fa-solid fa-plus"></i> 新規登録
    </button>

    <!-- Main Content -->
    <main id="app-main">
        <!-- Dynamic Content Area -->
        <div id="app-content">
            <div class="page-title">ダッシュボードを読み込み中</div>
            <div class="shell-skeleton">
                <div class="skeleton-block" style="width:42%"></div>
                <div class="skeleton-block" style="width:66%"></div>
                <div style="display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px;">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
        </div>
    </main>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新規登録</h3>
                <button class="btn-close" id="close-registration-modal">&times;</button>
            </div>

            <div id="modal-body" class="modal-body">
                <!-- Multi-step content will be injected here -->
            </div>
        </div>
    </div>

    <!-- URL Input Modal -->
    <div id="url-input-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="url-modal-title">URLを更新</h3>
                <button class="btn-close"
                    onclick="document.getElementById('url-input-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">最新版の規約URL</label>
                    <input type="text" id="new-version-url" class="form-control" placeholder="https://example.com/terms"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn-dashboard"
                        onclick="document.getElementById('url-input-modal').classList.remove('active')">キャンセル</button>
                    <button class="btn-dashboard btn-primary-action" id="submit-url-btn">更新・解析を実行</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden File Input for PDF Upload -->
    <input type="file" id="reg-file-input" style="display: none;" accept="application/pdf">
    <input type="file" id="reg-compare-file-input" style="display: none;" accept=".docx">

    <!-- Invite Member Modal -->
    <div id="invite-member-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>メンバー招待</h3>
                <button class="btn-close"
                    onclick="document.getElementById('invite-member-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <div class="form-group">
                    <label>名前</label>
                    <input type="text" id="invite-name" class="form-control" placeholder="山田 太郎">
                </div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="invite-email" class="form-control" placeholder="taro@example.com">
                </div>
                <div class="form-group">
                    <label>権限</label>
                    <select id="invite-role" class="form-control">
                        <option value="閲覧のみ">閲覧のみ</option>
                        <option value="作業者">作業者</option>
                        <option value="管理者">管理者</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn-dashboard"
                        onclick="document.getElementById('invite-member-modal').classList.remove('active')">キャンセル</button>
                    <button class="btn-dashboard btn-primary-action" onclick="window.app.submitInvite()">招待を送信</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Upgrade Guidance Modal -->
    <div id="upgrade-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 450px; text-align: center;">
            <div class="modal-body" style="padding: 40px 32px;">
                <div style="font-size: 3rem; color: #c19b4a; margin-bottom: 20px;">
                    <i class="fa-solid fa-crown"></i>
                </div>
                <h3 style="margin-bottom: 16px; font-size: 1.4rem;">Businessプラン限定機能</h3>
                <p style="color: #666; line-height: 1.6; margin-bottom: 32px;">
                    「チーム管理」はBusinessプラン以上の機能です。<br>
                    アップグレードするとチームメンバーの招待や管理が可能になります。
                </p>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="btn-dashboard btn-primary-action" style="width: 100%; padding: 12px;"
                        onclick="window.app.navigate('plan'); document.getElementById('upgrade-modal').classList.remove('active');">
                        プランをアップグレードする
                    </button>
                    <button class="btn-dashboard" style="width: 100%; border: none; background: none; color: #888;"
                        onclick="document.getElementById('upgrade-modal').classList.remove('active')">
                        あとで
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div id="edit-member-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>メンバー編集</h3>
                <button class="btn-close"
                    onclick="document.getElementById('edit-member-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <input type="hidden" id="edit-original-email">
                <div class="form-group">
                    <label>名前</label>
                    <input type="text" id="edit-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="edit-email" class="form-control" disabled
                        style="background-color: #f5f5f5;">
                </div>
                <div class="form-group">
                    <label>権限</label>
                    <select id="edit-role" class="form-control">
                        <option value="閲覧のみ">閲覧のみ</option>
                        <option value="作業者">作業者</option>
                        <option value="管理者">管理者</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn-dashboard btn-danger-action" style="margin-right: auto;"
                        onclick="window.app.deleteMember()">削除</button>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-dashboard"
                            onclick="document.getElementById('edit-member-modal').classList.remove('active')">キャンセル</button>
                        <button class="btn-dashboard btn-primary-action" onclick="window.app.updateMember()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-confirm-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>メンバー削除の確認</h3>
                <button class="btn-close"
                    onclick="document.getElementById('delete-confirm-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <p>本当にこのメンバーを削除してもよろしいですか？</p>
                <p style="color: #666; font-size: 13px; margin-top: 8px;">この操作は取り消せません。</p>

                <div class="form-actions" style="justify-content: flex-end;">
                    <button class="btn-dashboard"
                        onclick="document.getElementById('delete-confirm-modal').classList.remove('active')">キャンセル</button>
                    <button class="btn-dashboard btn-danger-action"
                        onclick="window.app.executeDeleteMember()">削除する</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification System -->
    <script src="js/notify.js?v=20260309p1"></script>
    <!-- App Logic -->
    <script type="module" src="js/dashboard.js?v=1.8.33"></script>
    <script type="module">
        import { requireAuth, handleLogout } from './js/auth.js';

        // Protect Route
        requireAuth();

        // Logout Binding
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
    </script>
</body>

</html>
