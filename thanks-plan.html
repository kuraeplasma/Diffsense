<body>
    <div class="thanks-container">
        <div class="thanks-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1 class="thanks-title" id="thanks-title">繝励Λ繝ｳ繧帝∈謚槭＠縺ｾ縺励◆</h1>
        <div id="plan-badge"></div>


        <div class="thanks-info">
            <div class="thanks-info-row">
                <span class="thanks-info-label">驕ｸ謚槭・繝ｩ繝ｳ</span>
                <span class="thanks-info-value" id="plan-name">-</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label">Word / PDF / URL 逋ｻ骭ｲ</span>
                <span class="thanks-info-value">辟｡蛻ｶ髯・/span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label" id="thanks-row3-label">縺泌茜逕ｨ譁咎≡</span>
                <span class="thanks-info-value" id="thanks-row3-value">-</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label" id="thanks-row4-label">譛磯俣AI隗｣譫仙屓謨ｰ</span>
                <span class="thanks-info-value" id="thanks-row4-value">-</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label" id="thanks-row5-label">譛磯俣髮ｻ蟄千ｽｲ蜷・/span>
                <span class="thanks-info-value" id="thanks-row5-value">-</span>
            </div>
        </div>


        <button class="thanks-btn-payment" id="payment-btn" onclick="startPayment()">
            <i class="fa-solid fa-credit-card"></i>
            縺頑髪謇輔＞縺ｸ騾ｲ繧
        </button>

    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getApiBaseUrl } from './js/api-base.js';

        const params = new URLSearchParams(window.location.search);
        const validPlans = ['starter', 'business', 'pro'];
        const rawPlan = (params.get('plan') || localStorage.getItem('diffsense_selected_plan') || '').toLowerCase();
        const plan = validPlans.includes(rawPlan) ? rawPlan : 'pro';
        const billing = params.get('billing') === 'annual' ? 'annual' : 'monthly';
        const planNames = { starter: 'Starter', business: 'Business', pro: 'Pro' };
        const planPrices = { starter: 'ﾂ･1,480', business: 'ﾂ･4,980', pro: 'ﾂ･9,800' };
        const planLimits = { starter: '譛・0蝗・, business: '譛・20蝗・, pro: '譛・00蝗・ };
        const signLimits = { starter: '譛・5莉ｶ', business: '譛・00莉ｶ', pro: '辟｡蛻ｶ髯・ };

        localStorage.setItem('diffsense_selected_plan', plan);

        document.getElementById('plan-name').textContent = planNames[plan] || plan;

        const badge = document.getElementById('plan-badge');
        badge.innerHTML = `<span class="plan-badge ${plan}">${planNames[plan] || plan}</span>`;

        document.getElementById('thanks-title').textContent = `${planNames[plan] || plan}繝励Λ繝ｳ繧帝∈謚槭＠縺ｾ縺励◆`;

        document.getElementById('thanks-row3-label').textContent = '縺泌茜逕ｨ譁咎≡';
        document.getElementById('thanks-row3-value').textContent = `${planPrices[plan] || '-'} / 譛・;
        document.getElementById('thanks-row4-label').textContent = '譛磯俣AI隗｣譫仙屓謨ｰ';
        document.getElementById('thanks-row4-value').textContent = planLimits[plan] || '-';
        if (document.getElementById('thanks-row5-value')) {
            document.getElementById('thanks-row5-value').textContent = signLimits[plan] || '-';
        }

        // Auth state - get token for Stripe
        let currentToken = null;
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentToken = await user.getIdToken();
            }
        });

        window.startPayment = async () => {
            const btn = document.getElementById('payment-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 豎ｺ貂医・繝ｼ繧ｸ縺ｸ遘ｻ蜍穂ｸｭ...';
            try {
                const apiBase = getApiBaseUrl();
                const headers = { 'Content-Type': 'application/json' };
                if (currentToken) headers.Authorization = `Bearer ${currentToken}`;

                const res = await fetch(`${apiBase}/api/createCheckoutSession`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        plan,
                        billingCycle: billing,
                        cancelUrl: `${window.location.origin}/thanks-plan.html?plan=${plan}&billing=${billing}`
                    })
                });
                const result = await res.json();
                if (result.success && result.data?.url) {
                    sessionStorage.setItem('stripe_checkout_started', 'true');
                    window.location.href = result.data.url;
                } else {
                    throw new Error(result.error || '豎ｺ貂医・繝ｼ繧ｸ繧帝幕縺代∪縺帙ｓ縺ｧ縺励◆');
                }
            } catch (e) {
                console.error('Payment error:', e);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-credit-card"></i> 縺頑髪謇輔＞縺ｸ騾ｲ繧';
                alert('豎ｺ貂医・繝ｼ繧ｸ縺ｮ隱ｭ縺ｿ霎ｼ縺ｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆縲ゅム繝・す繝･繝懊・繝峨・繝励Λ繝ｳ邂｡逅・°繧牙・蠎ｦ縺願ｩｦ縺励￥縺縺輔＞縲・);
            }
        };
    </script>
