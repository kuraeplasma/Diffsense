<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIFFsense Mail Preview</title>
</head>
<body style="margin:0;padding:40px 20px;background:#fdfcfb;font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',Meiryo,sans-serif;color:#2b2623;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fdfcfb;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;border:1px solid #e7e0d6;overflow:hidden;box-shadow:0 12px 32px rgba(26,21,18,0.08);">
          <tr>
            <td style="background:#1a1512;padding:18px 24px;color:#c5a059;font-size:17px;line-height:1;font-family:Helvetica,Arial,sans-serif;font-weight:600;letter-spacing:0.5px;mso-line-height-rule:exactly;">DIFFsense</td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 8px;font-size:15px;font-weight:700;color:#2b2623;">Preview 様</p>
              <p style="margin:0 0 24px;font-size:14px;color:#5e544d;line-height:1.8;">ヘッダーは文字だけで、左側に白い枠やアイコンが出ない状態の確認用プレビューです。</p>
              <div style="background:#f4f0ec;border:1px solid #eadfcd;border-radius:12px;padding:16px 20px;">
                <p style="margin:0 0 5px;font-size:11px;color:#8a7a6a;text-transform:uppercase;letter-spacing:.06em;">対象書類</p>
                <p style="margin:0;font-size:15px;font-weight:700;color:#2b2623;">署名依頼メール プレビュー</p>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
