<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>契約書の差分チェック・リスク要約｜DIFFsense</title>
    <meta name="description" content="契約書の変更点を自動検出し、リスクをAIが要約。見落としを防ぎ、レビュー時間を削減します。差分チェックから電子署名まで一括対応。">
    <meta property="og:title" content="契約書の差分チェック・リスク要約｜DIFFsense">
    <meta property="og:description" content="契約書の変更点を自動検出し、リスクをAIが要約。見落としを防ぎます。">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon2.png?v=2">
    <script src="js/attribution.js?v=20260417a"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17941578077"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-17941578077');
    </script>

    <script>
        // 無料登録導線はFree開始に変更
        const appendAttributionParams = (url) => {
            if (window.DiffsenseAttribution && typeof window.DiffsenseAttribution.appendAttributionParams === 'function') {
                return window.DiffsenseAttribution.appendAttributionParams(url, ['gclid', 'wbraid', 'gbraid']);
            }

            const targetUrl = new URL(url, window.location.origin);
            ['gclid', 'wbraid', 'gbraid'].forEach((key) => {
                const storageKey = `attr_${key}`;
                const value =
                    targetUrl.searchParams.get(key) ||
                    localStorage.getItem(storageKey) ||
                    sessionStorage.getItem(storageKey);
                if (value) {
                    targetUrl.searchParams.set(key, value);
                }
            });
            return targetUrl.toString();
        };

        const params = new URLSearchParams(window.location.search);
        const billing = params.get('billing') === 'annual' ? 'annual' : 'monthly';
        localStorage.setItem('diffsense_selected_plan', 'free');
        localStorage.setItem('diffsense_selected_billing_cycle', billing);
        localStorage.setItem('diffsense_signup_flow', '1');
        localStorage.removeItem('diffsense_trial_expired_flow');
        localStorage.removeItem('diffsense_trial_expired');
        window.location.replace(appendAttributionParams(`login.html?tab=signup&billing=${billing}`));
    </script>
</head>
