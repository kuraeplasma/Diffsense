    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #f8f6f3 0%, #eee8e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thanks-container {
            text-align: center;
            max-width: 620px;
            width: 92%;
            padding: 60px 48px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08);
        }

        .thanks-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #243060 0%, #141c3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pop-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thanks-icon i {
            font-size: 2rem;
            color: #fff;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .thanks-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #24292E;
            margin-bottom: 12px;
        }

        .thanks-subtitle {
            font-size: 0.95rem;
            color: #586069;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .thanks-info {
            background: #faf8f5;
            border: 1px solid #e8e0d4;
            border-radius: 10px;
            padding: 20px 24px;
            margin: 0 auto 32px;
            text-align: left;
            max-width: 340px;
            width: 100%;
        }

        .thanks-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.88rem;
            color: #444;
        }

        .thanks-info-row:not(:last-child) {
            border-bottom: 1px solid #f0ece6;
        }

        .thanks-info-label {
            color: #888;
        }

        .thanks-info-value {
            font-weight: 500;
            color: #24292E;
        }

        .thanks-btn {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #243060 0%, #141c3a 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .thanks-btn:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #2e3c7a 0%, #1a2451 100%);
            box-shadow: 0 4px 16px rgba(26, 35, 64, 0.4);
        }

        .thanks-btn i {
            align-self: center;
            flex-shrink: 0;
        }

        .plan-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .plan-badge.free {
            background: #f0f0f0;
            color: #555;
        }

        .thanks-note {
            margin-top: 24px;
            font-size: 0.78rem;
            color: #999;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .confetti span {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
            opacity: 0.7;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>

<body>
    <div class="confetti" id="confetti"></div>

    <div class="thanks-container" style="position:relative; z-index:1;">
        <div class="thanks-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <span class="plan-badge free">Free</span>
        <h1 class="thanks-title">Freeプランの登録が完了しました</h1>

        <div class="thanks-info">
            <div class="thanks-info-row">
                <span class="thanks-info-label">選択プラン</span>
                <span class="thanks-info-value">Free</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label">Word / PDF / URL 登録</span>
                <span class="thanks-info-value">無制限</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label">AI解析回数</span>
                <span class="thanks-info-value">月3回</span>
            </div>
            <div class="thanks-info-row">
                <span class="thanks-info-label">電子署名</span>
                <span class="thanks-info-value">月10件</span>
            </div>
        </div>

        <a id="next-btn" href="dashboard.html" class="thanks-btn">
            <i class="fa-solid fa-gauge-high"></i>
            ダッシュボードへ
        </a>

        <p class="thanks-note">※解析回数は毎月1日にリセットされます</p>
    </div>

    <script>
        // LP経由でプラン選択済みならダッシュボードへ
        const params = new URLSearchParams(window.location.search);
        if (params.get('next') === 'dashboard') {
            const btn = document.getElementById('next-btn');
            btn.href = 'dashboard.html';
            btn.innerHTML = '<i class="fa-solid fa-gauge-high"></i> ダッシュボードへ';
        }

        // Confetti animation
        const confetti = document.getElementById('confetti');
        const colors = ['#c5a059', '#d4b46a', '#22c55e', '#3b82f6', '#f59e0b', '#ef4444'];
        for (let i = 0; i < 40; i++) {
            const span = document.createElement('span');
            span.style.left = Math.random() * 100 + '%';
            span.style.background = colors[Math.floor(Math.random() * colors.length)];
            span.style.animationDuration = (2 + Math.random() * 3) + 's';
            span.style.animationDelay = Math.random() * 2 + 's';
            span.style.width = (6 + Math.random() * 6) + 'px';
            span.style.height = (6 + Math.random() * 6) + 'px';
            confetti.appendChild(span);
        }
    </script>

    <!-- Google Ads Conversion Tag (Double-firing prevention) -->
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const clickId = params.get('gclid') || params.get('wbraid') || params.get('gbraid') || 'no_click_id';
            const KEY = `ads_conversion_fired_${clickId}`;

            if (sessionStorage.getItem(KEY)) {
                console.log('already fired for click id:', clickId);
                return;
            }

            if (typeof gtag !== 'function') {
                console.log('gtag not loaded');
                return;
            }

            gtag('event', 'conversion', {
                'send_to': 'AW-17941578077/G1WaCJUKMspOcEN2Cm-tC',
                'value': 1.0,
                'currency': 'JPY'
            });

            console.log('Google Ads conversion tag fired. click id:', clickId);

            sessionStorage.setItem(KEY, 'true');
        })();
    </script>
</body>
