<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>署名依頼メールプレビュー</title>
</head>
<body style="margin:0;padding:0;background:#fdfcfb;font-family:'Noto Sans JP','Inter','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;color:#2b2623;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fdfcfb;padding:40px 20px;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0"
        style="background:#ffffff;border-radius:16px;border:1px solid #e7e0d6;overflow:hidden;box-shadow:0 12px 32px rgba(26,21,18,0.08);">
        <tr><td style="background:#1a1512;padding:0 24px;height:60px;">
          <div style="display:flex;align-items:center;height:60px;">
            <img src="images/scaled_favicon.png" alt="" width="26" height="26" style="width:26px;height:26px;display:block;object-fit:contain;margin-right:6px;">
            <span style="color:#c5a059;font-size:22px;line-height:1;font-family:'Helvetica','Arial',sans-serif;font-weight:800;letter-spacing:0.02em;display:inline-block;">DIFFsense</span>
          </div>
        </td></tr>
        <tr><td style="padding:32px;">
          <p style="margin:0 0 8px;font-size:15px;font-weight:700;color:#2b2623;">山田 太郎 様</p>
          <p style="margin:0 0 24px;font-size:14px;color:#5e544d;line-height:1.8;">
            DIFFsenseより、この契約へのご署名依頼をお送りしています。
          </p>
          <div style="background:#f4f0ec;border:1px solid #eadfcd;border-radius:12px;padding:16px 20px;margin-bottom:28px;">
            <p style="margin:0 0 5px;font-size:11px;color:#8a7a6a;text-transform:uppercase;letter-spacing:.06em;">対象書類</p>
            <p style="margin:0;font-size:15px;font-weight:700;color:#2b2623;">業務委託基本契約書_2026年3月版</p>
          </div>
          <div style="text-align:center;margin-bottom:28px;">
            <a href="https://app.firma.dev/signing/example"
              style="display:inline-block;background:#c5a059;color:#ffffff;text-decoration:none;border-radius:12px;padding:14px 42px;font-size:15px;font-weight:700;box-shadow:0 8px 18px rgba(197,160,89,0.28);">
              書類を確認して署名する
            </a>
          </div>
          <p style="margin:0 0 6px;font-size:13px;color:#5e544d;line-height:1.8;">
            書類内容をご確認のうえ、ご署名をお願いいたします。<br>
            ご不明な点がある場合は、依頼元（DIFFsense）へご確認ください。
          </p>
          <div style="margin-top:20px;padding:12px 16px;background:#f8f5f0;border-radius:10px;border:1px solid #eee3d2;">
            <p style="margin:0 0 4px;font-size:11px;color:#8a7a6a;">ボタンが開かない場合は以下のURLをブラウザに貼り付けてください</p>
            <a href="https://app.firma.dev/signing/example" style="font-size:11px;color:#c5a059;word-break:break-all;">https://app.firma.dev/signing/example</a>
          </div>
        </td></tr>
        <tr><td style="background:#f8f5f0;border-top:1px solid #eee3d2;padding:18px 32px;text-align:center;">
          <p style="margin:0;font-size:11px;color:#8a7a6a;line-height:1.6;white-space:nowrap;">
            このメールはDIFFsenseから送信されています。心当たりがない場合は破棄してください。
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
