    <style>
        /* Document/Binder Style Override */
        body {
            background-color: #f7f3f0;
            background-image: none;
            /* Removed pattern as requested */
            font-family: var(--font-body);
        }

        /* The "Binder" Card */
        .auth-card {
            background: #fff;
            padding: 3.2rem 2.6rem 2.6rem 4.6rem;
            border-radius: 4px 12px 12px 4px;
            box-shadow:
                -1px 0 0 #e2ddd9,
                -2px 0 0 #fcfaf7,
                -3px 0 5px rgba(0, 0, 0, 0.05),
                10px 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            min-height: 760px;
            height: 760px;
            /* Keep login/signup card size stable on desktop */
            border-right: 2px solid rgba(197, 160, 89, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            filter: drop-shadow(0 8px 16px rgba(23, 20, 15, 0.08));
        }

        /* Binder Spine (Black/Dark Grey for Professional Look) */
        .auth-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 45px;
            background: linear-gradient(to right, #2a2a2a, #1a1a1a);
            border-radius: 4px 0 0 4px;
            box-shadow: inset -1px 0 2px rgba(255, 255, 255, 0.1), inset -2px 0 5px rgba(0, 0, 0, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Binder Holes */
        .binder-holes {
            position: absolute;
            left: 12px;
            top: 0;
            bottom: 0;
            display: flex;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            height: 100%;
            z-index: 2;
        }

        /* Realistic 3D Rings */
        .hole {
            width: 50px;
            /* Span across spine and paper */
            height: 10px;
            /* Thickness of the ring wire */
            background: linear-gradient(to bottom, #9fa4a7 0%, #f5f5f5 40%, #f5f5f5 60%, #7f8c8d 100%);
            /* Metallic Gradient */
            border-radius: 2px;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.4);
            position: relative;
            margin-left: 0;
            z-index: 5;
        }

        /* Hole in the Spine (Dark) */
        .hole::before {
            content: "";
            position: absolute;
            left: -4px;
            top: -3px;
            width: 16px;
            height: 16px;
            background: #111;
            /* Dark hole */
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8), 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        /* Hole in the Paper (White) */
        .hole::after {
            content: "";
            position: absolute;
            right: -4px;
            top: -3px;
            width: 16px;
            height: 16px;
            background: #fdfcfb;
            /* Match paper bg */
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15), 0 1px 0 #fff;
            z-index: -1;
        }

        /* Center the Auth Card */
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Horizontal Auth Tabs (SaaS Style) */
        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.4rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0;
        }

        .auth-tab {
            text-decoration: none;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 500;
            color: #999;
            padding-bottom: 0.8rem;
            margin-bottom: -2px;
            /* Overlap border */
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .auth-tab.active {
            color: #c5a059;
            font-weight: 700;
            border-bottom: 2px solid #c5a059;
        }

        .auth-tab:hover:not(.active) {
            color: #c5a059;
        }


        .auth-logo {
            text-align: center;
            margin-bottom: 1.9rem;
            font-family: "Helvetica", "Arial", sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: #c5a059;
        }

        .auth-logo a {
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }


        .auth-subtitle {
            color: #888;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .signup-assurance-note {
            margin: 0.1rem 0 0.9rem 0;
            font-size: 0.81rem;
            color: #7a5d2d;
            text-align: center;
            line-height: 1.55;
            background: linear-gradient(180deg, #fdfaf2 0%, #f8f3e8 100%);
            border: 1px solid #e7d9bd;
            border-radius: 10px;
            padding: 0.72rem 0.9rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
        }

        #signup-btn {
            border-radius: 10px !important;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 18px rgba(145, 111, 43, 0.26);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, background-color 0.2s ease;
        }

        #signup-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(145, 111, 43, 0.3);
            filter: brightness(1.06);
        }

        #signup-btn:active {
            transform: translateY(0);
            box-shadow: 0 6px 14px rgba(145, 111, 43, 0.22);
        }

        .signup-trust-inline {
            margin: 0.72rem 0 0;
            text-align: center;
            color: #6e6254;
            font-size: 0.72rem;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }

        .auth-separator {
            margin: 0.7rem 0 0.65rem;
            text-align: center;
            color: #8f806f;
            font-size: 0.76rem;
            position: relative;
            font-weight: 500;
        }

        .auth-separator::before,
        .auth-separator::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 42%;
            border-top: 1px solid #d7cbb9;
        }

        .auth-separator::before {
            left: 0;
        }

        .auth-separator::after {
            right: 0;
        }

        .google-auth-btn {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ccbca6;
            background: #fff;
            color: #52493f;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.8rem 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
        }

        .google-auth-btn:hover {
            background: #faf8f5;
            border-color: #d4c7b0;
        }

        .form-group {
            margin-bottom: 1.45rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #e1d9ce;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-input:focus {
            border-color: #c5a059;
            outline: none;
            background: rgba(197, 160, 89, 0.03);
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.12);
        }

        .toggle-password {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #bbb;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #c5a059;
        }

        .auth-links {
            margin-top: 0.7rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .auth-links p {
            margin-bottom: 1rem;
        }

        .auth-links a {
            color: #c5a059;
            font-weight: 600;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 0.9rem;
            color: #999 !important;
            font-size: 0.85rem;
            font-weight: 400 !important;
            text-decoration: none !important;
        }

        /* Loading Spinner */
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .auth-card {
                height: auto;
                min-height: 650px;
                padding: 3.2rem 1.6rem 2.4rem 3.8rem;
            }

            .auth-tabs {
                gap: 1.1rem;
            }

            .signup-trust-inline {
                font-size: 0.68rem;
            }
        }
    </style>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Decorative Holes: Removed as per user request (Spine Only) -->

            <h1 class="auth-logo">
                <a href="index.html">
                    <i class="fa-solid fa-scale-balanced"></i>
                    <span>DIFFsense</span>
                </a>
            </h1>

            <div class="auth-tabs">
                <div class="auth-tab" id="tab-login" onclick="switchTab('login')">ログイン</div>
                <div class="auth-tab active" id="tab-signup" onclick="switchTab('signup')">新規登録</div>
            </div>

            <!-- LOGIN VIEW -->
            <div id="view-login" style="display: none;">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="login-email">メールアドレス</label>
                        <div class="input-wrapper">
                            <input type="email" id="login-email" class="form-input" required
                                placeholder="example@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">パスワード</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" class="form-input" required
                                placeholder="••••••••">
                            <i class="fa-solid fa-eye-slash toggle-password" data-target="login-password"></i>
                        </div>
                        <div style="margin-top: 0.55rem; text-align: right;">
                            <a href="#" id="forgot-password-link"
                                style="font-size: 0.82rem; color: #8a6a2d; text-decoration: underline;">パスワードをお忘れですか？</a>
                        </div>
                    </div>
                    <button type="button" class="google-auth-btn" id="login-google-btn">
                        <i class="fa-brands fa-google"></i> Googleでログイン
                    </button>
                    <button type="submit" class="btn full-width" id="login-btn"
                        style="margin-top: 0.7rem; border-radius: 8px; padding: 0.98rem 1rem; background: #c5a059; color: #fff; border: none; font-weight: 700;">ログイン</button>
                </form>
            </div>

            <!-- SIGNUP VIEW -->
            <div id="view-signup">
                <form id="signup-form">
                    <div class="form-group">
                        <label class="form-label" for="signup-email">メールアドレス</label>
                        <div class="input-wrapper">
                            <input type="email" id="signup-email" class="form-input" required
                                placeholder="example@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signup-password">パスワード</label>
                        <div class="input-wrapper">
                            <input type="password" id="signup-password" class="form-input" required placeholder="6文字以上"
                                minlength="6">
                            <i class="fa-solid fa-eye-slash toggle-password" data-target="signup-password"></i>
                        </div>
                    </div>
                    <button type="button" class="google-auth-btn" id="signup-google-btn">
                        <i class="fa-brands fa-google"></i> Googleで無料登録
                    </button>
                    <button type="submit" class="btn full-width" id="signup-btn"
                        style="margin-top: 0.7rem; border-radius: 8px; padding: 0.98rem 1rem; background: #c5a059; color: #fff; border: none; font-weight: 700;">無料で始める</button>
                    <p class="signup-trust-inline">7日間無料 ・ カード不要 ・ いつでも解約可能 ・ AI学習不使用</p>
                </form>
            </div>

            <div class="auth-links">
                <a href="index.html" class="back-link">← 書類を閉じてトップページへ</a>
            </div>
        </div>
    </div>

    <!-- Notification System -->
    <script src="js/notify.js?v=20260311b"></script>
    <script>
        // --- UI State Logic (works on file:// and http://) ---
        window.switchTab = (tab) => {
            const loginView = document.getElementById('view-login');
            const signupView = document.getElementById('view-signup');
            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');

            if (tab === 'login') {
                loginView.style.display = 'block';
                signupView.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginView.style.display = 'none';
                signupView.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
            }

            try {
                const url = new URL(window.location.href);
                url.searchParams.set('tab', tab);
                history.replaceState(null, '', url.toString());
            } catch (e) {
                // Ignore URL rewriting errors in restricted local environments.
            }
        };

        // --- Password Toggle Logic ---
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // --- Initial State Check ---
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPlan = urlParams.get('plan');
        const selectedBilling = urlParams.get('billing') === 'annual' ? 'annual' : 'monthly';
        if (selectedPlan && ['starter', 'business', 'pro'].includes(selectedPlan)) {
            localStorage.setItem('diffsense_selected_plan', selectedPlan);
            localStorage.setItem('diffsense_selected_billing_cycle', selectedBilling);
        }

        if (urlParams.get('mode') === 'login' || urlParams.get('tab') === 'login') {
            switchTab('login');
        } else if (urlParams.get('mode') === 'signup' || urlParams.get('tab') === 'signup') {
            switchTab('signup');
        }
    </script>
    <!-- Auth Logic -->
    <script type="module">
        import { handleLogin, handleSignUp, handleGoogleLogin, handleGoogleRedirectResult, handlePasswordReset } from './js/auth.js?v=20260311d';

        await handleGoogleRedirectResult();

        // --- Login Form Submit ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.classList.add('btn-loading');
            try {
                await handleLogin(email, password);
            } finally {
                btn.classList.remove('btn-loading');
            }
        });

        // --- Signup Form Submit ---
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            btn.classList.add('btn-loading');
            try {
                await handleSignUp(email, password);
            } finally {
                btn.classList.remove('btn-loading');
            }
        });

        document.getElementById('login-google-btn').addEventListener('click', async () => {
            await handleGoogleLogin();
        });

        document.getElementById('signup-google-btn').addEventListener('click', async () => {
            await handleGoogleLogin();
        });

        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            await handlePasswordReset(email);
        });

    </script>
</body>
